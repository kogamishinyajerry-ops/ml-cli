name: ml CLI Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'bin/**'
      - 'matlab/**'
      - 'tests/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # manual trigger

jobs:
  unit-tests:
    name: ml Command Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a

      - name: Verify MATLAB
        run: |
          echo "MATLAB path: $(which matlab)"
          matlab -batch "fprintf('MATLAB %s ready\n', version('-release'))"

      - name: Add ml to PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: |
          chmod +x tests/test_all.sh
          bash tests/test_all.sh
        timeout-minutes: 15

      - name: Quick smoke tests
        run: |
          echo "=== eval smoke ==="
          ml eval "1+1" | grep -v "Trial License" || exit 1
          ml eval --json "eye(2)" | grep -v "Trial License" | grep "\[" || exit 1
          ml eval --table "magic(2)" | grep -v "Trial License" | grep "|" || exit 1

          echo "=== info smoke ==="
          ml info 2>&1 | grep -v "Trial License" | head -5

          echo "=== bench smoke ==="
          ml bench 2>&1 | grep -v "Trial License" | grep "matrix" || exit 1

          echo "=== error handling ==="
          ! ml eval "undefined_var()" 2>/dev/null && echo "Error handling OK"

      - name: Report
        if: always()
        run: |
          echo "=== CI Summary ==="
          echo "ml CLI tests completed"
          ml info --json 2>/dev/null | python3 -c "
  import json,sys
  try:
      d=json.load(sys.stdin)
      print(f'MATLAB {d[\"release\"]} on {d[\"computer\"]}')
  except:
      print('MATLAB ready')
  " 2>/dev/null || echo "MATLAB ready"

  format-tests:
    name: Output Format Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: matlab-actions/setup-matlab@v2
        with:
          release: R2024a

      - name: Add ml to PATH
        run: echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Test JSON output
        run: |
          ml eval --json "rand(2)" 2>&1 | grep -v "Trial" | python3 -c "
  import json, sys
  data = json.load(sys.stdin)
  assert len(data) == 2 and len(data[0]) == 2, 'Bad shape'
  print(f'JSON OK: {len(data)}x{len(data[0])}')
  "

      - name: Test Table output
        run: |
          ml eval --table "magic(2)" 2>&1 | grep -v "Trial" | grep "|" && echo "Table OK"

      - name: Test CSV output
        run: |
          ml eval --csv "[1 2;3 4]" 2>&1 | grep -v "Trial" | grep "," && echo "CSV OK"

      - name: Test Pipe input
        run: |
          result=$(echo "1:5" | ml eval "sum(ans)" 2>&1 | grep -v "Trial" | tr -d ' ')
          [ "$result" = "15" ] && echo "Pipe OK" || exit 1
